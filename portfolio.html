<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohamed Rifky - Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Caveat:wght@700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">   
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* CSS Variables */
        :root {
            --bg-color: #050505;
            --text-white: #ffffff;
            --text-accent: #ffb400; /* Yellow accent color */
        }

        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Container for padding */
        .wrapper {
            padding: 2rem 5%;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
        }

        /* Header (Icons and Toggle) */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            animation: fadeInDown 1s ease-out;
        }

        .left-icons {
            display: flex;
            gap: 10px;
        }

        .icon-circle {
            width: 30px;
            height: 30px;
            background-color: var(--text-accent);
            color: #000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
            cursor: pointer;
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        .icon-circle:hover {
            transform: scale(1.1);
            background-color: #fff;
        }

        /* Theme Toggle Switch */
        .theme-toggle {
            width: 65px;
            height: 32px;
            background-color: var(--text-accent);
            border-radius: 30px;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 0 5px;
            transition: background-color 0.3s ease;
        }

        .toggle-circle {
            width: 22px;
            height: 22px;
            background-color: #000;
            border-radius: 50%;
            position: absolute;
            right: 5px; /* Default right position based on image */
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* Main Content */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            margin-top: 5rem;
            margin-bottom: 3rem;
            padding-left: 2rem;
        }

        .text-group {
            position: relative;
        }

        .cursive-text {
            font-family: 'Caveat', cursive;
            color: var(--text-accent);
            font-size: 10rem;
            position: absolute;
            top: -65px;
            left: 10px;
            z-index: 2;
            transform: rotate(-5deg);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            /* Animation */
            opacity: 1;
            animation: slideInCursive 1.2s ease-out 0.5s forwards;
        }

        .giant-title {
            font-family: 'Anton', sans-serif; /* Thick, condensed font matching 'PORTFOLIO' */
            font-size: 25rem;
            line-height: 0.85;
            letter-spacing: 2px;
            color: var(--text-white);
            margin-bottom: 0;
            z-index: 1;
            position: relative;
            /* Animation */
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.2s forwards;
        }

        .name-title {
            color: var(--text-accent);
            font-size: 3.5rem;
            font-weight: 700;
            margin-top: 10px;
            letter-spacing: -1px;
            /* Animation */
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.6s forwards;
        }

        .subtitle {
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 1px;
            /* Animation */
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.8s forwards;
        }

        /* Footer Navigation */
        nav {
            margin-top: auto;
            padding-bottom: 1rem;
            padding-left: 2rem;
            /* Animation */
            opacity: 0;
            animation: fadeIn 1s ease-out 1.2s forwards;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 3rem;
        }

        .nav-links a {
            color: var(--text-white);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            transition: color 0.3s ease, transform 0.3s ease;
            display: inline-block;
        }

        .nav-links a:hover {
            color: var(--text-accent);
            transform: translateY(-3px);
        }

        .my-img{
            position: absolute;
            z-index: 10;
            right: 0;
              /* width: 100%; */
                /* height: 100%; */
                /* object-fit: cover;  */
        }

        /* --- Animations Keyframes --- */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInCursive {
            0% {
                opacity: 0;
                transform: rotate(-15deg) translateX(-50px) scale(0.8);
            }
            100% {
                opacity: 1;
                transform: rotate(-5deg) translateX(0) scale(1);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Responsive Adjustments */
        @media (max-width: 1200px) {
            .giant-title { font-size: 12rem; }
            .cursive-text { font-size: 4.5rem; top: -50px; }
            .name-title { font-size: 3rem; }
        }

        @media (max-width: 768px) {
            .giant-title { font-size: 7rem; }
            .cursive-text { font-size: 3.5rem; top: -40px; }
            .name-title { font-size: 2rem; }
            .subtitle { font-size: 1.2rem; }
            .nav-links { gap: 1.5rem; }
            main, nav { padding-left: 0; }
        }
        
        @media (max-width: 480px) {
            .giant-title { font-size: 4.5rem; }
            .cursive-text { font-size: 2.5rem; top: -25px; }
            .name-title { font-size: 1.5rem; }
            .subtitle { font-size: 1rem; }
        }

        /* Light Mode Classes (Toggled via JS) */
        body.light-mode {
            --bg-color: #f0f0f0;
            --text-white: #111111;
        }
        body.light-mode .toggle-circle {
            background-color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <div class="left-icons">
                <div class="icon-circle"><i class="fa-solid fa-magnifying-glass"></i></div>
                <div class="icon-circle"><i class="fa-solid fa-play"></i></div>
            </div>
            
            <div class="theme-toggle" id="themeToggle">
                <div class="toggle-circle" id="toggleCircle"></div>
            </div>
        </header>

        <main>
            <div class="text-group">
                <div class="cursive-text">Welcome To My</div>
                <h1 class="giant-title">PORTFOLIO</h1>
                <h2 class="name-title">MOHAMED RIFKY</h2>
                <p class="subtitle">A SOFTWARE ENGINEER</p>
            </div>

            <div class="my-img">
                <img src="myimg.png" alt="myimage">
            </div>
        </main>

        <nav>
            <ul class="nav-links">
                <li><a href="#">Contact</a></li>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
            </ul>
        </nav>
    </div>

    <script>
        // Theme Toggle Interaction with Animation
        const themeToggle = document.getElementById('themeToggle');
        const toggleCircle = document.getElementById('toggleCircle');
        let isDark = true;

        themeToggle.addEventListener('click', () => {
            isDark = !isDark;
            
            if (isDark) {
                // Move circle to the right
                toggleCircle.style.transform = 'translateX(0)';
                document.body.classList.remove('light-mode');
            } else {
                // Move circle to the left (Width of toggle - width of circle - padding)
                toggleCircle.style.transform = 'translateX(-33px)';
                document.body.classList.add('light-mode');
            }
        });

        // Add a subtle continuous floating animation to the cursive text after load
        setTimeout(() => {
            const cursive = document.querySelector('.cursive-text');
            cursive.style.animation = 'none'; // reset entrance
            
            let floatAmount = 0;
            setInterval(() => {
                floatAmount += 0.05;
                const yPos = Math.sin(floatAmount) * 5;
                cursive.style.transform = `rotate(-5deg) translateY(${yPos}px)`;
            }, 50);
        }, 1800); // Start after entrance animations finish
    </script>
</body>
</html>
